name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    name: Build and test (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-24.04
          - platform: windows
            os: windows-2022

    env:
      VCPKG_ROOT: vcpkg
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up MSVC
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends build-essential ninja-build lcov zip

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install VCPKG
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.sh -disableMetrics

      - name: Configure HealthGPS (debug)
        run: cmake --preset=${{ matrix.platform }}-debug -DWARNINGS_AS_ERRORS=ON -DGENERATE_COVERAGE=ON

      - name: Build HealthGPS (debug)
        run: cmake --build --preset=debug-build-${{ matrix.platform }} --target install

      - name: Execute HealthGPS (debug)
        run: out/install/${{ matrix.platform }}-debug/bin/HealthGPS.Console --help

      - name: Run tests
        run: ctest --preset=core-test-${{ matrix.platform }} --output-on-failure

      - name: Build HealthGPS (release)
        run: |
          cmake --preset=${{ matrix.platform }}-release -DWARNINGS_AS_ERRORS=ON
          cmake --build --preset=release-build-${{ matrix.platform }} --target install

      - name: Execute HealthGPS (release)
        run: out/install/${{ matrix.platform }}-release/bin/HealthGPS.Console --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: health-gps-${{ matrix.platform }}
          path: ${{ github.workspace }}/out/install/${{ matrix.platform }}-*/*
          if-no-files-found: error

      - name: Generate coverage report
        if: matrix.platform == 'linux'
        working-directory: ${{ github.workspace }}/out/build/linux-debug
        run: geninfo . --include 'src/HealthGPS*' --exclude 'src/HealthGPS.Tests' --output-file main_coverage.info

      - name: Upload coverage to Codecov
        if: matrix.platform == 'linux'
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}