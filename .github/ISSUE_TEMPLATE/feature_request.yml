name: Feature request
description: Suggest an idea or enhancement for Health-GPS
title: "[ENHANCEMENT]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature for Health-GPS.
        Please fill in the sections below to help the team understand the problem, the proposed solution, and any alternatives you have considered.

  - type: textarea
    id: feature-description
    attributes:
      label: Feature request description
      description: Describe the problem, gap, or frustration that prompted this request.
      placeholder: e.g. I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: desired-solution
    attributes:
      label: Describe the solution you'd like
      description: Explain clearly what you would like to happen.
      placeholder: Describe the feature or change you want to see.
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Describe alternatives you've considered
      description: List any alternative solutions, workarounds, or related ideas you have considered.
      placeholder: Describe any alternatives you have thought about.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, examples, or screenshots relevant to this request.
      placeholder: Add any extra detail here.
    validations:
      required: false