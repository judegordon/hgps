name: Bug report
description: Report a reproducible problem in Health-GPS
title: "[BUG]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please fill in the sections below so we can reproduce and investigate the issue.

  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: Give a clear and concise description of the problem.
      placeholder: Tell us what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Use config file '...'
        2. Run command '...'
        3. Observe issue in output/log/text '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      description: Which operating system are you using?
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: commit-hash
    attributes:
      label: Health-GPS commit hash
      description: Provide the commit hash if known.
      placeholder: e.g. 10a07448f31960acfa5d3cba782067e76de3c008
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any extra details, logs, screenshots, or context here.
      placeholder: Anything else that may help us investigate.
    validations:
      required: false
